<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/fondo.css">
<link rel="stylesheet" href="css/perfil.css">
</head>

<body class="profile">

<div class="profile-header">

  <div class="avatar-big">D</div>

  <div class="profile-user">
    <h2>David Gutierrez</h2>
    <p>0 Seguidores • 0 Seguidos</p>
  </div>

</div>

<div class="profile-actions">
  <button class="btn-secondary">Compartir</button>
  <button class="btn-primary">Editar perfil</button>
</div>

<div class="profile-tabs">
  <button class="tab active">Desempeño</button>
</div>

<div class="profile-summary">
  <h1>Nivel 10</h1>
  <p>Has respondido 71 preguntas correctamente</p>
</div>

<div class="profile-cards">
    <div class="profile-card">
    <h4>Tu especialidad: Vocabulary</h4>
    <h3>Historia</h3>
    <p>76% aciertos</p>
        <div class="progress-bar"><div class="progress" style="width:76%"></div>
        </div>
        <span class="icon">📖</span>
    </div>

    <div class="profile-card">
        <h4>La más desafiante: Read</h4>
        <h3>Arte</h3>
        <p>60% aciertos</p>
        <div class="progress-bar"><div class="progress" style="width:60%"></div></div>
        <div class="icvocabulary"></div><span class="icon">📚</span>
    </div>
    
</div>

<div class="profile-progress">

<h3>Progress</h3>

<div class="progress-bar">
<div class="progress"></div>
</div>

<p>60% to next level</p>

</div>


<!-- NAVBAR -->

<div class="navbar">

<div onclick="goMenu()">🏠</div>
<div onclick="goMissions()">🎯</div>
<div onclick="goGame()">🎮</div>
<div class="active">👤</div>

</div>

<script>

function goMenu(){
window.location.href="menu.html"
}

function goMissions(){
window.location.href="missions.html"
}

function goGame(){
window.location.href="roulette.html"
}

</script>

</body>
</html>
